name: tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        numpy-version: ['2.0.2', '2.1.3', '2.2.6', '2.3.5', '2.4.6', '2.5.0']
        os: [ubuntu-latest]
        exclude:
        - python-version: '3.13'
          numpy-version: '2.0.2'
        - python-version: '3.14'
          numpy-version: '2.0.2'
        - python-version: '3.14'
          numpy-version: '2.1.3'
        - python-version: '3.14'
          numpy-version: '2.2.6'
        - python-version: '3.10'
          numpy-version: '2.3.5'
        - python-version: '3.10'
          numpy-version: '2.4.4'
        - python-version: '3.10'
          numpy-version: '2.5.0'
        - python-version: '3.11'
          numpy-version: '2.5.0'
    steps:
    - uses: actions/checkout@v6
    - name: Set up ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install numpy==${{ matrix.numpy-version }}
        python -m pip install pytest
    - name: Install numpngw
      run: |
        python -m pip install .
    - name: Test with pytest
      run: |
        python -m pytest
